<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LH-OPS Terminal</title>

<style>
    :root {
        --bg-dark: #0a0f0a;
        --gold-bright: #f2df9f;
        --gold-muted: #d8c68c;
        --gold-dark: #75663a;
        --terminal-font: 'Courier New', Courier, monospace;
    }

    body {
        background: radial-gradient(circle, #1a261d 0%, #0a0f0a 100%);
        color: var(--gold-muted);
        font-family: var(--terminal-font);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        overflow: hidden;
    }

    /* CRT Scanline Effect Overlay */
    body::before {
        content: " ";
        display: block;
        position: fixed;
        top: 0; left: 0; bottom: 0; right: 0;
        background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                    linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
        z-index: 10;
        background-size: 100% 4px, 3px 100%;
        pointer-events: none;
    }

    #terminal-container {
        width: 90%;
        max-width: 600px;
        background: #050805;
        border: 2px solid var(--gold-dark);
        box-shadow: 0 0 20px rgba(0,0,0,0.8), inset 0 0 10px black;
        padding: 30px;
        position: relative;
        z-index: 1;
    }

    .terminal-header {
        text-align: center;
        color: var(--gold-bright);
        font-size: 0.9rem;
        margin-bottom: 20px;
        border-bottom: 1px solid var(--gold-dark);
        padding-bottom: 10px;
        text-transform: uppercase;
        letter-spacing: 2px;
    }

    .input-area {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
    }

    .input-box {
        flex-grow: 1;
        background: #000;
        border: 1px solid var(--gold-dark);
        color: var(--gold-bright);
        padding: 12px;
        font-family: var(--terminal-font);
        outline: none;
    }

    .input-box:focus {
        border-color: var(--gold-bright);
    }

    button {
        background: var(--gold-dark);
        border: none;
        color: #000;
        padding: 0 20px;
        cursor: pointer;
        font-weight: bold;
        font-family: var(--terminal-font);
        text-transform: uppercase;
        transition: background 0.3s ease;
    }

    button:hover {
        background: var(--gold-bright);
    }

    .response-area {
        background: black;
        border-left: 4px solid var(--gold-dark);
        color: var(--gold-bright);
        padding: 20px;
        min-height: 100px;
        font-size: 1.1rem;
        line-height: 1.5;
    }

    .cursor {
        display: inline-block;
        width: 10px;
        height: 20px;
        background: var(--gold-bright);
        animation: blink 1s infinite;
        vertical-align: middle;
    }

    @keyframes blink {
        0%, 50% { opacity: 1; }
        51%, 100% { opacity: 0; }
    }
</style>
</head>
<body>

<div id="terminal-container">
    <div class="terminal-header">
        Lake Herring Dept. of Ops // Inquiry Terminal v4.2
    </div>
    
    <div class="input-area">
        <input id="question" class="input-box" placeholder="Enter request for review..." autocomplete="off">
        <button onclick="handleInput()">Submit</button>
    </div>

    <div id="response" class="response-area">
        Awaiting inquiry...<span class="cursor"></span>
    </div>
</div>

<script>

const keys = {
    "bGFrZSBoZXJyaW5n": "Jurisdictional concerns.",
    "d2h5": "Further questioning is discouraged for your own safety.",
    "d2hhdA==": "Clearance level insufficient. Request denied.",
    "MjAwNw==": "Historical records remain sealed.",
    "Y2F0": "Council oversight authorized. Please step away from the terminal.",
    "ZmlzaA==": "Legacy compliance requirements."
};

function typeWriter(text, elementId) {
    const element = document.getElementById(elementId);
    // Keep the cursor visible but clear text
    element.innerHTML = ""; 
    let i = 0;
    
    function type() {
        if (i < text.length) {
            element.innerHTML = text.substring(0, i + 1) + '<span class="cursor"></span>';
            i++;
            setTimeout(type, 40);
        }
    }
    type();
}

function handleInput() {
    const inputField = document.getElementById("question");
    let q = inputField.value.toLowerCase().trim();
    
    if (q === "") return;

    let responseText = "Request forwarded to the appropriate department. No immediate answer available.";

    // Iterate through Base64 keys and check if decoded key is in user input
    for (const [encodedKey, value] of Object.entries(keys)) {
        if (q.includes(atob(encodedKey))) {
            responseText = value;
            break;
        }
    }

    typeWriter(responseText, "response");
    inputField.value = ""; // Clear input after submission
}

// Allow pressing "Enter" to submit
document.getElementById("question").addEventListener("keypress", function(event) {
    if (event.key === "Enter") {
        handleInput();
    }
});
</script>

</body>
</html>
