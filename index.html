<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LH-OPS Terminal</title>

<style>
    :root {
        --bg-dark: #0a0f0a;
        --gold-bright: #f2df9f;
        --gold-muted: #d8c68c;
        --gold-dark: #75663a;
        --terminal-font: 'Courier New', Courier, monospace;
    }

    body {
        background: radial-gradient(circle, #1a261d 0%, #0a0f0a 100%);
        color: var(--gold-muted);
        font-family: var(--terminal-font);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        overflow: hidden;
    }

    body::before {
        content: " ";
        display: block;
        position: fixed;
        top: 0; left: 0; bottom: 0; right: 0;
        background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                    linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 0, 0.06));
        z-index: 10;
        background-size: 100% 4px, 3px 100%;
        pointer-events: none;
    }

    #terminal-container {
        width: 90%;
        max-width: 600px;
        background: #050805;
        border: 2px solid var(--gold-dark);
        box-shadow: 0 0 20px rgba(0,0,0,0.8), inset 0 0 10px black;
        padding: 30px;
        position: relative;
        z-index: 1;
    }

    .terminal-header {
        text-align: center;
        color: var(--gold-bright);
        font-size: 0.9rem;
        margin-bottom: 20px;
        border-bottom: 1px solid var(--gold-dark);
        padding-bottom: 10px;
        text-transform: uppercase;
        letter-spacing: 2px;
    }

    .input-area {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
    }

    .input-box {
        flex-grow: 1;
        background: #000;
        border: 1px solid var(--gold-dark);
        color: var(--gold-bright);
        padding: 12px;
        font-family: var(--terminal-font);
        outline: none;
    }

    .input-box:focus {
        border-color: var(--gold-bright);
    }

    button {
        background: var(--gold-dark);
        border: none;
        color: #000;
        padding: 0 20px;
        cursor: pointer;
        font-weight: bold;
        font-family: var(--terminal-font);
        text-transform: uppercase;
        transition: background 0.3s ease;
    }

    button:hover {
        background: var(--gold-bright);
    }

    .response-area {
        background: black;
        border-left: 4px solid var(--gold-dark);
        color: var(--gold-bright);
        padding: 20px;
        min-height: 100px;
        font-size: 1.1rem;
        line-height: 1.5;
    }

    .cursor {
        display: inline-block;
        width: 10px;
        height: 20px;
        background: var(--gold-bright);
        animation: blink 1s infinite;
        vertical-align: middle;
    }

    @keyframes blink {
        0%, 50% { opacity: 1; }
        51%, 100% { opacity: 0; }
    }
</style>
</head>
<body>

<div id="terminal-container">
    <div class="terminal-header">
        Lake Herring Dept. of Ops // Inquiry Terminal v4.2
    </div>
    
    <div class="input-area">
        <input id="question" class="input-box" placeholder="Enter request for review..." autocomplete="off">
        <button onclick="handleInput()">Submit</button>
    </div>

    <div id="response" class="response-area">
        LAKE HERRING DEPARTMENT OF OPERATIONS. Establishing secure connection... Authenticating civilian access... WARNING: Historical records partially compromised. Terminal access granted. Awaiting inquiry...<span class="cursor"></span>
    </div>
</div>

<script>
/* ╔══════════════════════════════════════════════╗
   ║  CLASSIFIED — Pattern Recognition Required   ║
   ║  "The numbers mean nothing until you shift    ║
   ║   them by where they live."                   ║
   ╚══════════════════════════════════════════════╝ */

// Each entry: [ response_string, [position-shifted_codes...] ]
// Recover the trigger word by reversing 3 chained encodings:
//   (1) subtract index from each number → base64 char codes
//   (2) String.fromCharCode → base64 literal
//   (3) atob() → keyword
var _ = [
  ["Jurisdictional concerns.",
    [98,72,72,117,94,88,72,118,98,97,84,132,109,100,67,125]],
  ["Further questioning is discouraged for your own safety.",
    [100,51,106,56]],
  ["Clearance level insufficient. Request denied.",
    [100,51,106,107,104,70,67,68]],
  ["Historical records remain sealed.",
    [77,107,67,122,82,124,67,68]],
  ["Council oversight authorized. Please step away from the terminal.",
    [89,51,72,51]],
  ["Legacy compliance requirements.",
    [90,110,110,125,101,70,67,68]],
    ["Solar authorization recognized. Children remain compliant. Praise remains mandatory.",
    [99, 52, 88, 120]],
    ["Lunar instability detected. Peril remains unavoidable. Balance has shifted.",
    [98, 88, 59, 121]],
    ["Solar and lunar convergence detected. Cross-departmental containment procedures initiated. Historical precedent unavailable.",
    [90, 88, 80, 118, 101, 93, 72, 129, 98, 90, 71, 72]],
  ["Streaming protocols require Level-7 authorization. Access the live frequency here: <a href='https://kick.com/lakeherring' target='_blank' style='color: var(--gold-bright); text-decoration: underline;'>[Freq-Link]</a> Your signal has been logged.",
    [99,52,84,124,94,92,76,123]],
  ["Budget proposals are under inter-departmental review. Allocation for ops can be processed via the secure conduit: <a href='https://streamelements.com/lakeherring/tip' target='_blank' style='color: var(--gold-bright); text-decoration: underline;'>[Secure-Conduit]</a> No disbursement before fiscal audit.",
    [90,111,88,120,94,76,114,124,98,128,71,72]]
];

// ── Build keyword→response map at runtime ──
var KB = {};

for (var e = 0; e < _.length; e++) {
    var codes = _[e][1];
    // Remove position-based shift → recover base64 char codes
    var b64 = "";
    for (var i = 0; i < codes.length; i++) {
        b64 += String.fromCharCode(codes[i] - i);
    }
    // Decode base64 → trigger keyword
    var key = atob(b64).toLowerCase();
    KB[key] = _[e][0];
}

function typeWriter(text, elementId) {
    var el = document.getElementById(elementId);
    el.innerHTML = "";
    var i = 0;
    function type() {
        if (i < text.length) {
            // Check if we are inside an HTML tag
            if (text[i] === '<') {
                var closingTag = text.indexOf('>', i);
                if (closingTag !== -1) {
                    el.innerHTML += text.substring(i, closingTag + 1);
                    i = closingTag + 1;
                    setTimeout(type, 1); // Burst through tags instantly
                    return;
                }
            }
            el.innerHTML = text.substring(0, i + 1) + '<span class="cursor"></span>';
            i++;
            setTimeout(type, 30); // Slightly faster base speed (40ms -> 30ms)
        } else {
            // Final cursor placement
            el.innerHTML = el.innerHTML.replace(/<span class="cursor"><\/span>$/g, '<span class="cursor"></span>');
        }
    }
    type();
}

function handleInput() {
    var inputField = document.getElementById("question");
    var q = inputField.value.toLowerCase().trim();
    if (q === "") return;

    var hit = "Request forwarded to the appropriate department. No immediate answer available.";
    for (var key in KB) {
        if (KB.hasOwnProperty(key) && q.includes(key)) {
            hit = KB[key];
            break;
        }
    }

    typeWriter(hit, "response");
    inputField.value = "";
}

document.getElementById("question").addEventListener("keypress", function(e) {
    if (e.key === "Enter") handleInput();
});
</script>

</body>
</html>
