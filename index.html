<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <title>FinHub | The Finest Fish on the Net</title>
    <style>
        /* CSS - THE HUB AESTHETIC */
        :root {
            --hub-black: #000000;
            --hub-dark-grey: #1b1b1b;
            --hub-accent: #008cff; 
            --hub-text: #008cff;
            --hub-light-grey: #cccccc;
        }

        html, body { height: 100%; margin: 0; }
        body {
            background-color: var(--hub-black);
            color: var(--hub-text);
            font-family: Arial, Helvetica, sans-serif;
            display: flex;
            flex-direction: column;
        }

        header {
            background-color: var(--hub-dark-grey);
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 3px solid #333;
        }

        .logo { font-size: 28px; font-weight: bold; text-decoration: none; color: white; display: flex; align-items: center; }
        .logo span { background-color: var(--hub-accent); color: black; padding: 2px 6px; border-radius: 5px; margin-left: 2px; }

        .search-bar { display: flex; flex-grow: 0.5; margin: 0 20px; }
        .search-bar input { width: 100%; padding: 8px; border: 1px solid #444; background-color: #000; color: white; border-radius: 4px 0 0 4px; }
        .search-bar button { padding: 8px 15px; background-color: var(--hub-accent); border: none; cursor: pointer; font-weight: bold; border-radius: 0 4px 4px 0; }

        nav { background-color: #282828; padding: 10px 20px; display: flex; gap: 15px; font-size: 14px; }
        nav a { color: var(--hub-light-grey); text-decoration: none; transition: color 0.2s; }
        nav a:hover { color: var(--hub-accent); }

        .main-content { flex: 1 0 auto; padding: 20px; }
        h2 { font-size: 20px; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }

        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; }
        .card { background-color: var(--hub-dark-grey); border-radius: 5px; overflow: hidden; cursor: pointer; transition: transform 0.2s; position: relative; }
        .card:hover { transform: scale(1.03); outline: 2px solid var(--hub-accent); }
        .thumbnail { width: 100%; height: 135px; background-color: #333; object-fit: cover; }
        .card-info { padding: 10px; }
        .card-title { font-size: 14px; font-weight: bold; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card-meta { font-size: 12px; color: #999; }
        .duration { position: absolute; bottom: 65px; right: 10px; background-color: rgba(0,0,0,0.8); padding: 2px 5px; font-size: 11px; border-radius: 3px; }

        footer { flex-shrink: 0; text-align: center; padding: 40px; color: #ffffff; font-size: 12px; background-color: var(--hub-dark-grey); }
        footer a { color: #ffffff; text-decoration: none; margin: 0 5px; cursor: pointer; }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 100;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
        }

        #videoContainer {
            border: 5px solid var(--hub-accent);
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 30px rgba(0,140,255,0.3);
        }

        .legal-content { background: #1b1b1b; padding: 30px; border: 2px solid var(--hub-accent); max-width: 600px; color: #ccc; line-height: 1.6; }
        .close-btn { position: absolute; top: 20px; right: 30px; color: white; font-size: 40px; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">Fin<span>Hub</span></a>
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Search for fishy content..." onkeydown="handleSearchKey(event)" oninput="handleSearchInput()">
            <button onclick="searchFish()">Search</button>
        </div>
        <div style="color: var(--hub-accent); font-weight: bold; cursor: pointer;">Upload Fin</div>
    </header>

    <nav>
        <a href="#">Bottom Feeders</a> <a href="#">Schooling</a> <a href="#">Deep Sea</a> <a href="#">Tropical</a> <a href="#">Goldfish</a> <a href="#">Verified Gills ✅</a>
    </nav>

    <div class="main-content">
        <h2 id="category-title">Most Scaled Videos</h2>
        <div class="video-grid" id="videoGrid"></div>
    </div>

    <footer>
        &copy; 2026 FinHub.com - No Fish Were Harmed. <br><br>
        <a onclick="openLegal('tos')">Terms of Service</a> | <a onclick="openLegal('privacy')">Privacy Policy</a> | <a onclick="openLegal('leak')">Report a Leak</a>
    </footer>

    <div id="player" class="modal" onclick="handleModalClick(event, 'player')">
        <span class="close-btn" onclick="closeModal('player')">&times;</span>
        <h2 id="playingTitle" style="color: var(--hub-accent); margin-bottom: 15px;"></h2>
        <div id="videoContainer" onclick="event.stopPropagation()"></div>
        <p style="color: white; margin-top: 15px;">Enjoying this fish? Rate it 5 fins! ⭐⭐⭐⭐⭐</p>
    </div>

    <div id="legalModal" class="modal" onclick="handleModalClick(event, 'legalModal')">
        <span class="close-btn" onclick="closeModal('legalModal')">&times;</span>
        <h2 id="legalTitle" style="color: var(--hub-accent);"></h2>
        <div id="legalBody" class="legal-content"></div>
    </div>

    <script>
    const API_KEY = "AIzaSyCQ8WFSxVOKliO7pItMEOv3G2jZcIwkAnQ";
    const PLAYLIST_ID = "PLesFbZ70pUtM";
    let fishDatabase = [];

    const legalTexts = {
        tos: {
            title: "Terms of Scale-vice",
            body: "1. By entering FinHub, you agree to be treated as a fish. <br><br> 2. You shall not attempt to cook any content found on this website.<br><br>3. We reserve the right to move your account to a different tank without notice.<br><br>4. Any disputes will be settled via bubble-blowing contest in the deep sea courts of Neptune."
        },
        privacy: {
            title: "Privacy Policy (The Bubble Wall)",
            body: "We value your privacy as much as a pufferfish values its air. <br><br> We do not store your data on hard drives; we etch it into coral reefs using tiny shrimp. <br><br> Your browsing history is shared only with the local school of tuna for quality assurance purposes. If you wish to be forgotten, please act like a goldfish and simply forget who you are."
        },
        leak: {
            title: "Report a Leak",
            body: "Is your tank springing a leak? Is there water where it shouldn't be? <br><br> Please report all leaks immediately to our Underwater Plumbing Department. Note: If the 'leak' is actually just your fish swimming too fast, that is not a bug; that is a feature of high-velocity fins."
        }
    };

    function renderVideos(filter = "") {
        const grid = document.getElementById('videoGrid');
        grid.innerHTML = "";
        const filteredFish = fishDatabase.filter(f => f.title.toLowerCase().includes(filter.toLowerCase()));
        filteredFish.forEach((fish) => {
            const thumbUrl = `https://img.youtube.com/vi/${fish.id}/hqdefault.jpg`;
            const card = document.createElement('div');
            card.className = 'card';
            card.onclick = () => openPlayer(fish);
            card.innerHTML = `
                <img src="${thumbUrl}" class="thumbnail">
                <div class="duration">${fish.duration}</div>
                <div class="card-info">
                    <div class="card-title">${fish.title}</div>
                    <div class="card-meta">${fish.views} views • ${fish.category}</div>
                </div>`;
            grid.appendChild(card);
        });
    }

    function handleSearchKey(e) { if (e.key === "Enter") searchFish(); }
    function handleSearchInput() {
        if (document.getElementById('searchInput').value === "") {
            renderVideos("");
            document.getElementById('category-title').innerText = "Most Scaled Videos";
        }
    }
    function searchFish() {
        const term = document.getElementById('searchInput').value;
        renderVideos(term);
        document.getElementById('category-title').innerText = term ? `Search results for: ${term}` : "Most Scaled Videos";
    }

    function openPlayer(fish) {
        document.getElementById('player').style.display = 'flex';
        document.getElementById('playingTitle').innerText = fish.title;
        const container = document.getElementById('videoContainer');
        container.innerHTML = ""; 

        if (fish.id) {
            const iframe = document.createElement('iframe');
            iframe.width = "854"; 
            iframe.height = "480";
            iframe.src = `https://www.youtube.com/embed/${fish.id}?rel=0`;
            iframe.title = fish.title;
            iframe.frameBorder = "0";
            iframe.allow = "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share";
            iframe.setAttribute("referrerpolicy", "strict-origin-when-cross-origin");
            iframe.allowFullscreen = true;
            container.appendChild(iframe);
        }
    }

    function openLegal(type) {
        const data = legalTexts[type];
        document.getElementById('legalTitle').innerText = data.title;
        document.getElementById('legalBody').innerHTML = data.body;
        document.getElementById('legalModal').style.display = 'flex';
    }

    function closeModal(id) {
        document.getElementById(id).style.display = 'none';
        if(id === 'player') document.getElementById('videoContainer').innerHTML = "";
    }

    function cleanTitle(title) {
        if (!title) return "Untitled Video";

        // 1. Remove all hashtags (#word)
        // This regex finds the # and all alphanumeric characters following it
        let cleaned = title.replace(/#\w+/g, '');

        // 2. Clean up whitespace and punctuation residuals
        cleaned = cleaned
            .replace(/\s+/g, ' ')     // Replace multiple spaces with one single space
            .trim();                  // Remove spaces from start and end

        // 3. Handle "Tag-Only" Titles
        // If the title was ONLY hashtags, 'cleaned' will be empty.
        // In this case, we remove JUST the '#' symbol so the words remain as a title.
        if (cleaned === "") {
            cleaned = title.replace(/#/g, '').replace(/\s+/g, ' ').trim();
        }

        // 4. Final Polish: Remove leading/trailing dashes or pipes often used to separate tags
        // Example: "My Fish - #goldfish" -> "My Fish -" -> "My Fish"
        cleaned = cleaned.replace(/^[\s\-\|]+|[\s\-\|]+$/g, '');

        return cleaned || "Untitled Video";
    }


    function formatDuration(duration) {
        if (!duration) return "0:00";
        const match = duration.match(/PT(\d+H)?(\d+M)?(\d+S)?/);
        const hours = parseInt(match[1]) || 0;
        const minutes = parseInt(match[2]) || 0;
        const seconds = parseInt(match[3]) || 0;

        if (hours > 0) {
            return `${hours}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }
        return `${minutes}:${seconds.toString().padStart(2, '0')}`;
    }

    async function loadPlaylist() {
        // 1. Check Cache
        const cachedFish = localStorage.getItem('finhub_cache');
        const cacheTime = localStorage.getItem('finhub_cache_time');
        const oneHour = 60 * 60 * 1000;

        if (cachedFish && (Date.now() - cacheTime < oneHour)) {
            console.log("Loading fish from the local tank...");
            fishDatabase = JSON.parse(cachedFish);
            renderVideos();
            return; 
        }

        // 2. Fresh Fetch logic
        let nextPageToken = ""; // MOVED TO TOP: Now defined before use in loop
        fishDatabase = []; // RESET: Prevent duplicates on refresh

        try {
            while (true) {
                const playlistUrl = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&playlistId=${PLAYLIST_ID}&maxResults=50&pageToken=${nextPageToken}&key=${API_KEY}`;
                const playlistResponse = await fetch(playlistUrl);
                const playlistData = await playlistResponse.json();

                if (playlistData.error) throw new Error(playlistData.error.message);

                const ids = playlistData.items.map(item => item.snippet.resourceId.videoId);

                if (ids.length > 0) {
                    const videoUrl = `https://www.googleapis.com/youtube/v3/videos?part=contentDetails,statistics&id=${ids.join(",")}&key=${API_KEY}`;
                    const videoResponse = await fetch(videoUrl);
                    const videoData = await videoResponse.json();

                    const lookup = {};
                    videoData.items.forEach(video => { lookup[video.id] = video; });

                    playlistData.items.forEach(item => {
                        const id = item.snippet.resourceId.videoId;
                        const info = lookup[id];

                        fishDatabase.push({
                            title: cleanTitle(item.snippet.title),
                            id: id,
                            views: info ? Number(info.statistics.viewCount).toLocaleString() : "0",
                            duration: info ? formatDuration(info.contentDetails.duration) : "0:00",
                            category: "Deep Sea"
                        });
                    });
                }

                nextPageToken = playlistData.nextPageToken;
                if (!nextPageToken) break;
            }
            
            // Save to cache and render ONLY if fetch was successful
            localStorage.setItem('finhub_cache', JSON.stringify(fishDatabase));
            localStorage.setItem('finhub_cache_time', Date.now());
            renderVideos(); 

        } catch (error) {
            console.error("Error loading fishy content:", error);
            document.getElementById('category-title').innerText = "The tank is leaking! (API Error)";
        }
    }

    function handleModalClick(e, id) { if (e.target.id === id) closeModal(id); }

    loadPlaylist();
    </script>

</body>
</html>
